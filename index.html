.ds .dl{font-size:10px;color:#555;margin-bottom:3px;text-align:center;}

.card{margin:0 16px 8px;background:#1a1a2e;border-radius:14px;padding:13px 14px;border:1px solid #ffffff07;display:flex;align-items:center;gap:12px;}

.bw{background:#00d09c15;}.bl{background:#ff4d6d15;}.bf{background:#ffa50015;}.bo{background:#33334430;}

.pnl{text-align:right;flex-shrink:0;}
.pnl .amt{font-size:16px;font-weight:700;}

.ph-amt{text-align:right;}
.ph-amt .amt{font-size:16px;font-weight:700;}
.ph-amt .meta{font-size:10px;color:#555;margin-top:2px;}

.pr{display:flex;justify-content:space-between;padding:7px 16px;}

.pr .prr{font-size:13px;font-weight:600;}

.upload-zone{margin:16px;border:2px dashed #2a2a3e;border-radius:16px;padding:28px 20px;text-align:center;cursor:pointer;background:#1a1a2e30;}

<body>
<div class="header">
  <h1>📊 Trading Journal</h1>
  <p id="sub">Importez votre relevé CSV Revolut</p>
</div>
<div id="app">
  <div class="upload-zone" onclick="document.getElementById('fi').click()">
    <div style="font-size:36px;margin-bottom:10px">📄</div>
    <h3>Charger un relevé CSV</h3>
    <p>Format Revolut · Glissez ou appuyez ici</p>
  </div>
  <div class="empty">📈<br><br>Aucune donnée chargée</div>
</div>
<input type="file" id="fi" accept=".csv,.txt" style="display:none">

<script>
let ALL=[], FILTERED=[], activeF='all', activeTab='trades';

document.getElementById('fi').addEventListener('change',e=>loadFile(e.target.files[0]));
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();loadFile(e.dataTransfer.files[0]);});

function loadFile(f){
  if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const t=parseCSV(e.target.result);
    if(!t.length){alert('Format non reconnu.');return;}
    // Fusion : on combine et on déduplique par date+sym+prix
    const merged=[...ALL,...t];
    const seen=new Set();
    ALL=merged.filter(x=>{
      const k=`${x.date?.getTime()}-${x.sym}-${x.type}-${x.pnl}-${x.buyPrice}-${x.sellPrice}`;
      if(seen.has(k))return false;
      seen.add(k);return true;
    }).sort((a,b)=>a.date-b.date);
    render();
  };
  r.readAsText(f);
}

function parseCSV(txt){
  const lines=txt.split('\n').map(l=>l.trim()).filter(l=>l);
  const raw=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(',');
    if(c.length<5)continue;
    const date=new Date(c[0].trim());
    if(isNaN(date.getTime()))continue;
    const sym=(c[1]||'').trim(), type=(c[2]||'').trim().toUpperCase();
    const qty=parseFloat(c[3])||0, price=parseFloat((c[4]||'').replace(/[^0-9.]/g,''))||0;
    const total=(c[5]||'').trim();
    if(type.includes('OVERNIGHT')){
      const v=parseFloat(total.replace(/[^0-9.\-]/g,''));
      raw.push({date,sym:'FEE',type:'fee',pnl:isNaN(v)?0:v,qty:0,price:0});
    }else if(type.startsWith('SELL')){
      raw.push({date,sym,side:'SELL',qty,price,type:'trade'});
    }else if(type.startsWith('BUY')){
      raw.push({date,sym,side:'BUY',qty,price,type:'trade'});
    }
  }
  return matchTrades(raw);
}

function matchTrades(raw){
  const result=[],q={};
  for(const t of [...raw].sort((a,b)=>a.date-b.date)){
    if(t.type==='fee'){result.push(t);continue;}
    const k=t.sym;
    if(!q[k])q[k]={BUY:[],SELL:[]};
    q[k][t.side].push(t);
    while(q[k].BUY.length&&q[k].SELL.length){
      const buy=q[k].BUY[0],sell=q[k].SELL[0];
      const qty=Math.min(buy.qty,sell.qty);
      const pnl=Math.round((sell.price-buy.price)*qty*100)/100;
      result.push({date:buy.date<sell.date?sell.date:buy.date,sym:k,qty,buyPrice:buy.price,sellPrice:sell.price,pnl,type:'paired'});
      buy.qty-=qty;sell.qty-=qty;
      if(buy.qty<0.001)q[k].BUY.shift();
      if(sell.qty<0.001)q[k].SELL.shift();
    }
  }
  for(const k in q)for(const t of [...q[k].BUY,...q[k].SELL])if(t.qty>0.001)result.push({...t,pnl:null,type:'open'});
  return result.sort((a,b)=>a.date-b.date);
}

const MFR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DFR=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const f2=n=>n.toFixed(2);
const fa=n=>n===null?'—':(n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2);
const fdate=d=>`${DFR[d.getUTCDay()]} ${d.getUTCDate()} ${MFR[d.getUTCMonth()].slice(0,3)}`;
const ftime=d=>d.toISOString().slice(11,16);
const dkey=d=>`${d.getUTCFullYear()}-${d.getUTCMonth()}-${d.getUTCDate()}`;
const mkey=d=>`${d.getUTCFullYear()}-${String(d.getUTCMonth()).padStart(2,'0')}`;
const ykey=d=>`${d.getUTCFullYear()}`;

function periodStats(){
  const bm={},by={};
  for(const t of ALL){
    if(t.type!=='paired'&&t.type!=='fee')continue;
    const mk=mkey(t.date),yk=ykey(t.date);
    if(!bm[mk])bm[mk]={pnl:0,wins:0,losses:0,fees:0,trades:0};
    if(!by[yk])by[yk]={pnl:0,wins:0,losses:0,fees:0,trades:0};
    if(t.type==='fee'){bm[mk].fees+=t.pnl;by[yk].fees+=t.pnl;}
    else{
      bm[mk].pnl+=t.pnl;bm[mk].trades++;by[yk].pnl+=t.pnl;by[yk].trades++;
      if(t.pnl>0){bm[mk].wins++;by[yk].wins++;}else{bm[mk].losses++;by[yk].losses++;}
    }
  }
  return{bm,by};
}

function applyFilter(f){
  activeF=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('on',b.dataset.f===f));
  switch(f){
    case'win':FILTERED=ALL.filter(t=>t.pnl!==null&&t.pnl>0);break;
    case'loss':FILTERED=ALL.filter(t=>t.pnl!==null&&t.pnl<0);break;
    case'open':FILTERED=ALL.filter(t=>t.type==='open');break;
    default:FILTERED=[...ALL];
  }
  renderList();
}

function switchTab(t){
  activeTab=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.t===t));
  document.getElementById('tab-trades').style.display=t==='trades'?'block':'none';
  document.getElementById('tab-stats').style.display=t==='stats'?'block':'none';
}

function toggleP(id){
  const b=document.getElementById('pb-'+id);
  const a=document.getElementById('pa-'+id);
  const open=b.classList.contains('open');
  b.classList.toggle('open',!open);
  if(a)a.classList.toggle('open',!open);
}

function render(){
  const paired=ALL.filter(t=>t.type==='paired');
  const wins=paired.filter(t=>t.pnl>0),losses=paired.filter(t=>t.pnl<0);
  const totalPnl=paired.reduce((s,t)=>s+(t.pnl||0),0);
  const fees=ALL.filter(t=>t.type==='fee').reduce((s,t)=>s+(t.pnl||0),0);
  const net=Math.round((totalPnl+fees)*100)/100;
  const wr=paired.length?Math.round(wins.length/paired.length*100):0;
  const best=paired.length?Math.max(...paired.map(t=>t.pnl)):0;
  const worst=paired.length?Math.min(...paired.map(t=>t.pnl)):0;
  document.getElementById('sub').textContent=`${ALL.length} opérations · ${paired.length} trades fermés`;

  const {bm,by}=periodStats();

  // Build stats tab
  let statsH='';
  statsH+='<div class="sec-lbl">Par année</div>';
  for(const yk of Object.keys(by).sort().reverse()){
    const y=by[yk],netY=Math.round((y.pnl+y.fees)*100)/100,wrY=y.trades?Math.round(y.wins/y.trades*100):0;
    statsH+=`<div class="period-card">
      <div class="ph" onclick="toggleP('y${yk}')">
        <div class="ph-info"><div class="name">📅 ${yk}</div><div class="sub">${y.trades} trades · ${wrY}% réussite</div></div>
        <div class="ph-amt"><div class="amt ${netY>=0?'pos':'neg'}">${fa(netY)}</div><div class="meta">net frais inclus</div></div>
        <span class="ph-arrow" id="pa-y${yk}">▾</span>
      </div>
      <div class="pb" id="pb-y${yk}">
        <div class="pr"><div class="prl">P&L brut</div><div class="prr ${y.pnl>=0?'pos':'neg'}">${fa(Math.round(y.pnl*100)/100)}</div></div>
        <div class="pr"><div class="prl">Frais overnight</div><div class="prr neg">${fa(y.fees)}</div></div>
        <div class="pr"><div class="prl">Gagnants / Perdants</div><div class="prr">${y.wins} / ${y.losses}</div></div>
      </div>
    </div>`;
  }
  statsH+='<div class="sec-lbl">Par mois</div>';
  for(const mk of Object.keys(bm).sort().reverse()){
    const m=bm[mk],netM=Math.round((m.pnl+m.fees)*100)/100,wrM=m.trades?Math.round(m.wins/m.trades*100):0;
    const [yr,mo]=mk.split('-');
    const mName=MFR[parseInt(mo)]+' '+yr;
    statsH+=`<div class="period-card">
      <div class="ph" onclick="toggleP('m${mk}')">
        <div class="ph-info"><div class="name">🗓 ${mName}</div><div class="sub">${m.trades} trades · ${wrM}% réussite</div></div>
        <div class="ph-amt"><div class="amt ${netM>=0?'pos':'neg'}">${fa(netM)}</div><div class="meta">net frais inclus</div></div>
        <span class="ph-arrow" id="pa-m${mk}">▾</span>
      </div>
      <div class="pb" id="pb-m${mk}">
        <div class="pr"><div class="prl">P&L brut</div><div class="prr ${m.pnl>=0?'pos':'neg'}">${fa(Math.round(m.pnl*100)/100)}</div></div>
        <div class="pr"><div class="prl">Frais overnight</div><div class="prr neg">${fa(m.fees)}</div></div>
        <div class="pr"><div class="prl">Gagnants / Perdants</div><div class="prr">${m.wins} / ${m.losses}</div></div>
      </div>
    </div>`;
  }
  statsH+='<div style="height:20px"></div>';

  document.getElementById('app').innerHTML=`
  <div class="topbar">
    <span style="font-size:12px;color:#555">${paired.length} trades · ${wins.length}W ${losses.length}L</span>
    <button class="clr" onclick="clearData()">✕ Effacer</button>
  </div>
  <div class="stats-grid">
    <div class="stat"><div class="lbl">P&L Net</div><div class="val ${net>=0?'pos':'neg'}">${fa(net)}</div><div class="sub">Frais: ${fa(fees)}</div></div>
    <div class="stat"><div class="lbl">Taux de réussite</div><div class="val ${wr>=50?'pos':'neg'}">${wr}%</div><div class="sub">${wins.length}W · ${losses.length}L</div></div>
    <div class="stat"><div class="lbl">Meilleur trade</div><div class="val pos">${fa(best)}</div></div>
    <div class="stat"><div class="lbl">Pire trade</div><div class="val neg">${fa(worst)}</div></div>
  </div>
  <div class="tabs">
    <div class="tab on" data-t="trades" onclick="switchTab('trades')">📋 Trades</div>
    <div class="tab" data-t="stats" onclick="switchTab('stats')">📊 Stats</div>
  </div>
  <div id="tab-trades">
    <div class="filters" style="margin-top:12px">
      <button class="fbtn on" data-f="all" onclick="applyFilter('all')">Tous</button>
      <button class="fbtn" data-f="win" onclick="applyFilter('win')">✅ Gagnants</button>
      <button class="fbtn" data-f="loss" onclick="applyFilter('loss')">❌ Perdants</button>
      <button class="fbtn" data-f="open" onclick="applyFilter('open')">🔓 Ouverts</button>
    </div>
    <div id="list"></div>
    <div style="margin:8px 16px 20px;border:1px dashed #2a2a3e;border-radius:12px;padding:12px;text-align:center;cursor:pointer;color:#555;font-size:13px" onclick="document.getElementById('fi').click()">
      📄 Charger un autre fichier
    </div>
  </div>
  <div id="tab-stats" style="display:none;margin-top:12px">${statsH}</div>`;

  applyFilter('all');
}

function renderList(){
  const list=document.getElementById('list');
  if(!list)return;
  let html='',curDay='',dayPnl=0,dayTrades=[],dayBuf='';
  function flushDay(){
    if(!curDay)return;
    const dw=dayTrades.filter(x=>x.pnl>0).length,dl=dayTrades.filter(x=>x.pnl<0).length;
    html+=`<div class="day-sum">
      <div class="ds"><div class="dl">P&L jour</div><div class="dv ${dayPnl>=0?'pos':'neg'}">${fa(Math.round(dayPnl*100)/100)}</div></div>
      <div class="ds"><div class="dl">Trades</div><div class="dv">${dayTrades.filter(x=>x.type==='paired').length}</div></div>
      <div class="ds"><div class="dl">W / L</div><div class="dv">${dw} / ${dl}</div></div>
    </div>`+dayBuf;
  }
  for(const t of FILTERED){
    const dk=dkey(t.date);
    if(dk!==curDay){flushDay();curDay=dk;dayPnl=0;dayTrades=[];dayBuf='';dayBuf+=`<div class="day-sep"><span>${fdate(t.date)}</span></div>`;}
    if(t.pnl!==null)dayPnl=Math.round((dayPnl+t.pnl)*100)/100;
    dayTrades.push(t);
    if(t.type==='fee'){
      dayBuf+=`<div class="card"><div class="badge bf">💸</div><div class="info"><div class="sym">Frais overnight</div><div class="tm">${ftime(t.date)}</div></div><div class="pnl"><div class="amt neg">${fa(t.pnl)}</div></div></div>`;
    }else if(t.type==='paired'){
      const w=t.pnl>=0;
      dayBuf+=`<div class="card"><div class="badge ${w?'bw':'bl'}">${w?'📈':'📉'}</div>
        <div class="info"><div class="sym">${t.sym.replace(':CFD','')}</div><div class="tm">${ftime(t.date)} · ${t.qty} unités</div><div class="dt">Achat $${f2(t.buyPrice)} → Vente $${f2(t.sellPrice)}</div></div>
        <div class="pnl"><div class="amt ${w?'pos':'neg'}">${fa(t.pnl)}</div><div class="sub">${w?'Gain':'Perte'}</div></div></div>`;
    }else{
      dayBuf+=`<div class="card" style="opacity:.4"><div class="badge bo">🔓</div><div class="info"><div class="sym">${t.sym.replace(':CFD','')}</div><div class="tm">${ftime(t.date)} · ${t.qty} unités</div><div class="dt">${t.side} @ $${f2(t.price)}</div></div><div class="pnl"><div class="amt" style="color:#444;font-size:12px">Position ouverte</div></div></div>`;
    }
  }
  flushDay();
  list.innerHTML=html||'<div class="empty">🔍<br><br>Aucun trade dans ce filtre</div>';
}

function clearData(){if(confirm('Effacer les données ?')){ALL=[];location.reload();}}
